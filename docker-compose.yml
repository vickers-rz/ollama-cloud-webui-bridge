services:
  ollama-cloud-proxy:
    # #8 改用本地构建的轻量镜像（~60 MB），替代 open-webui 大镜像（~1.5 GB）
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: ollama-cloud-proxy:local
    container_name: ollama-cloud-proxy
    restart: unless-stopped
    environment:
      CLOUD_MODELS: "gemma4:31b-cloud,nemotron-3-super:cloud"
      CHROME_AI_MODEL: "chrome-gemini-nano"
      CHROME_AI_UPSTREAM: "http://host.docker.internal:8766"
    volumes:
      # 挂载源文件方便开发期热修改，生产可去掉此行
      - ./work/ollama_cloud_proxy.py:/proxy/ollama_cloud_proxy.py:ro
